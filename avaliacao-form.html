<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtus Company — Avalie sua experiência</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0d0d0d;
    --gold: #c9a050;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,160,80,0.12);
    --bg: #111111;
    --card-bg: #181818;
    --surface: #212121;
    --white: #ffffff;
    --text: #e0e0e0;
    --muted: #888;
    --border: #2e2e2e;
    --success: #3a9e6a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(ellipse at 70% 10%, rgba(201,160,80,0.06) 0%, transparent 60%);
  }

  .card {
    background: var(--card-bg);
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  }

  .card-header {
    background: #0d0d0d;
    padding: 36px 40px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }

  .logo-wrap img {
    height: 60px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 12px rgba(201,160,80,0.3));
  }

  .card-header h1 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--white);
    font-size: 24px;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

  .card-body {
    padding: 32px 40px 36px;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,160,80,0.1);
  }

  input[type="text"]::placeholder { color: #555; }

  .star-field label { margin-bottom: 12px; }

  .stars { display: flex; gap: 6px; }
  .stars input { display: none; }

  .stars label {
    font-size: 34px;
    cursor: pointer;
    color: #333;
    transition: color 0.15s, transform 0.15s;
    text-transform: none;
    letter-spacing: 0;
    line-height: 1;
  }

  .stars label:hover, .stars label.active { color: var(--gold); }
  .stars label:hover { transform: scale(1.2); }

  .aspects {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .aspect-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    color: #888;
    user-select: none;
    background: var(--surface);
  }

  .aspect-item input { display: none; }
  .aspect-item:hover { border-color: var(--gold); color: var(--text); }

  .aspect-item.checked {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold-light);
    font-weight: 500;
  }

  .aspect-item .dot {
    width: 15px; height: 15px;
    border-radius: 3px;
    border: 1px solid #444;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .aspect-item.checked .dot { background: var(--gold); border-color: var(--gold); }
  .aspect-item.checked .dot::after { content: '✓'; color: #0d0d0d; font-size: 9px; font-weight: 800; }

  textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    min-height: 95px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,160,80,0.1);
  }

  textarea::placeholder { color: #555; }

  .consent {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    margin-bottom: 22px;
  }

  .consent input { display: none; }

  .consent-box {
    width: 17px; height: 17px;
    border: 1px solid #444;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .consent.checked .consent-box { background: var(--gold); border-color: var(--gold); }
  .consent.checked .consent-box::after { content: '✓'; color: #0d0d0d; font-size: 10px; font-weight: 800; }

  .consent span { font-size: 12px; color: #666; line-height: 1.5; }

  .btn-submit {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #b8902a, var(--gold), #b8902a);
    background-size: 200%;
    color: #0d0d0d;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background-position 0.4s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(201,160,80,0.25);
  }

  .btn-submit:hover {
    background-position: right;
    box-shadow: 0 6px 28px rgba(201,160,80,0.4);
  }

  .btn-submit:active { transform: scale(0.99); }

  /* SUCCESS */
  .success-screen {
    display: none;
    text-align: center;
    padding: 56px 40px;
  }

  .success-icon {
    width: 64px; height: 64px;
    background: rgba(58,158,106,0.12);
    border: 1px solid rgba(58,158,106,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
    color: var(--success);
  }

  .success-screen h2 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--white);
    font-size: 22px;
    margin-bottom: 10px;
  }

  .success-screen p { color: var(--muted); font-size: 14px; line-height: 1.7; }

  /* ADMIN */
  .admin-toggle {
    text-align: center;
    padding: 10px;
    border-top: 1px solid var(--border);
  }

  .admin-toggle button {
    background: none; border: none;
    font-size: 11px; color: #444;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em;
  }

  .admin-panel {
    display: none;
    padding: 22px 40px 28px;
    border-top: 1px solid var(--border);
    background: #141414;
  }

  .admin-panel h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .qr-container { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }

  #qrcode canvas, #qrcode img {
    border-radius: 6px;
    border: 5px solid #1e1e1e;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .qr-info { flex: 1; min-width: 160px; }
  .qr-info p { font-size: 12px; color: #666; line-height: 1.6; margin-bottom: 10px; }

  .copy-link-btn {
    padding: 8px 16px;
    background: var(--gold);
    color: #0d0d0d;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.2s;
  }

  .copy-link-btn:hover { opacity: 0.85; }
  .copy-success { color: var(--success); font-size: 12px; margin-top: 7px; display: none; }

  @media (max-width: 480px) {
    .card-body { padding: 24px 22px 28px; }
    .card-header { padding: 28px 22px 22px; }
    .aspects { grid-template-columns: 1fr; }
    .admin-panel { padding: 18px 22px 24px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo-wrap">
      <img id="logoImg" alt="Virtus Company">
    </div>
    <h1>Como foi sua experiência?</h1>
    <p>Sua opinião é muito importante para nós</p>
  </div>

  <div class="card-body" id="formArea">
    <div class="field">
      <label>Seu nome</label>
      <input type="text" id="clientName" placeholder="Ex: Maria Silva">
    </div>

    <div class="field star-field">
      <label>Nota geral</label>
      <div class="stars" id="starRating">
        <label data-val="1">★</label>
        <label data-val="2">★</label>
        <label data-val="3">★</label>
        <label data-val="4">★</label>
        <label data-val="5">★</label>
      </div>
    </div>

    <div class="field">
      <label>O que você mais gostou?</label>
      <div class="aspects" id="aspects">
        <label class="aspect-item"><input type="checkbox" value="Atendimento"><span class="dot"></span> Atendimento</label>
        <label class="aspect-item"><input type="checkbox" value="Qualidade"><span class="dot"></span> Qualidade</label>
        <label class="aspect-item"><input type="checkbox" value="Prazo"><span class="dot"></span> Prazo / Entrega</label>
        <label class="aspect-item"><input type="checkbox" value="Preço"><span class="dot"></span> Preço / Custo</label>
        <label class="aspect-item"><input type="checkbox" value="Criatividade"><span class="dot"></span> Criatividade</label>
        <label class="aspect-item"><input type="checkbox" value="Comunicação"><span class="dot"></span> Comunicação</label>
      </div>
    </div>

    <div class="field">
      <label>Seu comentário</label>
      <textarea id="comment" placeholder="Conta um pouco sobre sua experiência..."></textarea>
    </div>

    <label class="consent" id="consentLabel">
      <input type="checkbox" id="consentCheck">
      <span class="consent-box"></span>
      <span>Autorizo o uso do meu nome e comentário no site da Virtus Company para fins de divulgação.</span>
    </label>

    <button class="btn-submit" onclick="submitForm()">Enviar avaliação →</button>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">✓</div>
    <h2>Obrigado pela avaliação!</h2>
    <p>Sua opinião foi registrada com sucesso.<br>Isso nos ajuda a crescer cada vez mais.</p>
  </div>

  <div class="admin-toggle">
    <button onclick="toggleAdmin()">⚙ painel do proprietário</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <h3>📎 Compartilhar formulário</h3>
    <div class="qr-container">
      <div id="qrcode"></div>
      <div class="qr-info">
        <p>Imprima o QR Code ou copie o link para enviar pelo WhatsApp ou e-mail.</p>
        <button class="copy-link-btn" onclick="copyLink()">Copiar link</button>
        <p class="copy-success" id="copySuccess">✓ Link copiado!</p>
      </div>
    </div>
  </div>
</div>

  // --- Star Rating ---
  let selectedStars = 0;
  const starLabels = document.querySelectorAll('#starRating label');
  starLabels.forEach((lbl, idx) => {
    lbl.addEventListener('mouseenter', () => highlightStars(idx + 1));
    lbl.addEventListener('mouseleave', () => highlightStars(selectedStars));
    lbl.addEventListener('click', () => { selectedStars = idx + 1; highlightStars(selectedStars); });
  });
  function highlightStars(n) {
    starLabels.forEach((lbl, i) => lbl.classList.toggle('active', i < n));
  }

  document.querySelectorAll('.aspect-item').forEach(item => {
    item.addEventListener('click', () => item.classList.toggle('checked'));
  });

  document.getElementById('consentLabel').addEventListener('click', function() {
    this.classList.toggle('checked');
  });

  function submitForm() {
    const name = document.getElementById('clientName').value.trim();
    const comment = document.getElementById('comment').value.trim();
    const consent = document.getElementById('consentLabel').classList.contains('checked');
    if (!name) { alert('Por favor, informe seu nome.'); return; }
    if (!selectedStars) { alert('Por favor, selecione uma nota.'); return; }
    if (!comment) { alert('Por favor, escreva um comentário.'); return; }
    if (!consent) { alert('Por favor, autorize o uso da avaliação para continuar.'); return; }
    const aspects = [...document.querySelectorAll('.aspect-item.checked input')].map(i => i.value);
    const review = { name, stars: selectedStars, aspects, comment, date: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now() };
    const reviews = JSON.parse(localStorage.getItem('reviews') || '[]');
    reviews.push(review);
    localStorage.setItem('reviews', JSON.stringify(reviews));
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
  }

  function toggleAdmin() {
    const panel = document.getElementById('adminPanel');
    const visible = panel.style.display === 'block';
    panel.style.display = visible ? 'none' : 'block';
    if (!visible) generateQR();
  }

  function generateQR() {
    const container = document.getElementById('qrcode');
    if (container.innerHTML !== '') return;
    new QRCode(container, { text: window.location.href, width: 108, height: 108, colorDark: '#0d0d0d', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
  }

  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      document.getElementById('copySuccess').style.display = 'block';
      setTimeout(() => document.getElementById('copySuccess').style.display = 'none', 2500);
    });
  }
</script>
</body>
</html>
